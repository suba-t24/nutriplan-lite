steps:
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci']

  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['test']

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/nutriplan-lite:$COMMIT_SHA',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/nutriplan-lite:$COMMIT_SHA'
      ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      [
        'run',
        'deploy',
        'nutriplan-lite',
        '--image',
        'gcr.io/$PROJECT_ID/nutriplan-lite:$COMMIT_SHA',
        '--region',
        'australia-southeast1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'gcr.io/$PROJECT_ID/nutriplan-lite:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
